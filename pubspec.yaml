name: timepickerfield
description: >-
  A read-only, web-style overlay time picker text field with HOURS/MINUTES
  dropdowns and full keyboard navigation. Writes an HH:mm string.
version: 0.1.0
publish_to: 'none'
repository: https://github.com/hubaib33/timerpicker

environment:
  sdk: ^3.6.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
